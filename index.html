<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>One-Button Runner</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #222; color: white; font-family: sans-serif; }
        canvas { border: 2px solid #555; background: #000; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="200"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Game State
        let player = { x: 50, y: 150, width: 30, height: 30, dy: 0, jumping: false };
        let obstacles = [];
        let score = 0;
        let gameOver = false;

        // Input
        document.addEventListener("keydown", (e) => {
            if (e.code === "Space") {
                if (gameOver) {
                    resetGame();
                } else if (!player.jumping) {
                    player.dy = -12;
                    player.jumping = true;
                }
            }
        });

        function resetGame() {
            player.y = 150;
            player.dy = 0;
            player.jumping = false;
            obstacles = [];
            score = 0;
            gameOver = false;
            requestAnimationFrame(update);
        }

        function update() {
            if (gameOver) return;

            // Physics
            player.dy += 0.6; // Gravity
            player.y += player.dy;

            if (player.y + player.height > 200) {
                player.y = 200 - player.height;
                player.jumping = false;
            }

            // Obstacles
            if (Math.random() < 0.02) {
                obstacles.push({ x: 800, width: 30, height: 40 });
            }

            for (let i = 0; i < obstacles.length; i++) {
                obstacles[i].x -= 5;

                // Collision
                if (
                    player.x < obstacles[i].x + obstacles[i].width &&
                    player.x + player.width > obstacles[i].x &&
                    player.y + player.height > 200 - obstacles[i].height
                ) {
                    gameOver = true;
                }

                if (obstacles[i].x + obstacles[i].width < 0) {
                    obstacles.splice(i, 1);
                    score++;
                }
            }

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Player
            ctx.fillStyle = "#00FF00";
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Draw Obstacles
            ctx.fillStyle = "#FF0000";
            obstacles.forEach(o => ctx.fillRect(o.x, 200 - o.height, o.width, o.height));

            // Draw Score
            ctx.fillStyle = "white";
            ctx.fillText("Score: " + score, 10, 20);

            if (gameOver) {
                ctx.fillText("GAME OVER - Press Space to Restart", 300, 100);
            }
        }

        update();
    </script>
</body>
</html>
