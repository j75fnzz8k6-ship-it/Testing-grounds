<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Console</title>
    <style>
        :root {
            --cockpit-bg: #1a1a1c;
            --panel-border: #444;
            --screen-bg: #000;
            --text-glow: #00ff41;
            --button-bg: #2d2d30;
            --button-border: #555;
            --accent: #ff4500;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #0b0b0b;
            background-image: radial-gradient(#1c1c1c 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Courier New', Courier, monospace;
        }

        .cockpit-frame {
            background-color: var(--cockpit-bg);
            padding: 20px;
            border: 8px solid var(--panel-border);
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            width: 320px;
        }

        .header {
            color: var(--text-glow);
            font-size: 12px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        #display {
            width: 100%;
            height: 50px;
            background-color: var(--screen-bg);
            color: var(--text-glow);
            border: 2px solid var(--text-glow);
            text-align: right;
            padding: 10px;
            font-size: 24px;
            box-sizing: border-box;
            margin-bottom: 20px;
            box-shadow: inset 0 0 10px rgba(0, 255, 65, 0.3);
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 15px;
            font-size: 18px;
            background-color: var(--button-bg);
            color: #fff;
            border: 1px solid var(--button-border);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background-color: #3d3d40;
            border-color: var(--text-glow);
        }

        button.operator {
            color: #00d4ff;
        }

        button.equals {
            background-color: var(--accent);
            grid-column: span 2;
        }

        button.clear {
            background-color: #8b0000;
        }
    </style>
</head>
<body>

    <div class="cockpit-frame">
        <div class="header">Navigation Computer v2.0</div>
        <input type="text" id="display" disabled placeholder="0">
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">AC</button>
            <button onclick="appendToDisplay('/')">/</button>
            <button onclick="appendToDisplay('*')">×</button>
            <button onclick="deleteLast()">DEL</button>
            
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button class="operator" onclick="appendToDisplay('-')">-</button>
            
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button class="operator" onclick="appendToDisplay('+')">+</button>
            
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button onclick="calculate()" class="equals">=</button>
            
            <button onclick="appendToDisplay('0')" style="grid-column: span 2;">0</button>
            <button onclick="appendToDisplay('.')">.</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');

        function appendToDisplay(value) {
            display.value += value;
        }

        function clearDisplay() {
            display.value = '';
        }

        function deleteLast() {
            display.value = display.value.slice(0, -1);
        }

        function calculate() {
            try {
                // Using Function constructor as a safer alternative to eval()
                display.value = new Function('return ' + display.value)();
            } catch (error) {
                display.value = 'ERROR';
                setTimeout(clearDisplay, 1000);
            }
        }
    </script>
</body>
</html>
