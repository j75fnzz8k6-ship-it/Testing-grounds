<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>D&D Character Scroll</title>
    <style>
        /* Aesthetic: Medieval Desk */
        body { 
            background: #3e2723; /* Dark wood desk color */
            font-family: 'Georgia', serif; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
        }

        .parchment { 
            background-color: #f4e4bc; 
            background-image: url('https://www.transparenttextures.com/patterns/aged-paper.png');
            width: 500px; padding: 40px; border-radius: 5px;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.7), inset 0 0 100px rgba(0,0,0,0.1);
            border: 2px solid #8b4513; color: #4e342e; text-align: center;
        }

        .page { display: none; }
        .page.active { display: block; }

        /* Inputs */
        input { 
            background: transparent; border: none; border-bottom: 1px solid #8b4513; 
            font-family: 'Georgia', serif; font-size: 1.2rem; color: #4e342e; text-align: center; width: 80%;
        }
        input:focus { outline: none; background: #e0d0a0; }

        button { 
            background: #8b4513; color: #f4e4bc; border: 1px solid #5d2e0a;
            padding: 8px 15px; cursor: pointer; font-family: 'Georgia', serif; margin: 10px;
        }
        button:hover { background: #5d2e0a; }

        /* Character Sheet Style */
        .sheet { text-align: left; border: 1px solid #8b4513; padding: 15px; }
        .sheet h3 { border-bottom: 2px solid #8b4513; margin-top: 0; }
        .sheet-row { display: flex; justify-content: space-between; margin: 5px 0; }
    </style>
</head>
<body>

<div class="parchment" id="main-container">
    <!-- Start -->
    <div id="page-start" class="page active">
        <h1>The Adventurer's Scroll</h1>
        <p>A new legend is to be written...</p>
        <button onclick="nextPage('page-race')">Begin</button>
    </div>

    <!-- Edit Pages -->
    <div id="page-race" class="page">
        <h2>Character Race</h2>
        <input type="text" id="in-race" oninput="update('race', this.value)">
        <br><button onclick="randomize('race')">Roll Race</button>
        <br><button onclick="nextPage('page-gender')">Next</button>
    </div>

    <div id="page-gender" class="page">
        <h2>Character Gender</h2>
        <input type="text" id="in-gender" oninput="update('gender', this.value)">
        <br><button onclick="randomize('gender')">Roll Gender</button>
        <br><button onclick="nextPage('page-stats')">Next</button>
    </div>

    <div id="page-stats" class="page">
        <h2>Ability Scores</h2>
        <div id="stat-list"></div>
        <button onclick="rollAllStats()">Roll All</button>
        <br><button onclick="nextPage('page-class')">Next</button>
    </div>

    <div id="page-class" class="page">
        <h2>Character Class</h2>
        <input type="text" id="in-class" oninput="update('class', this.value)">
        <br><button onclick="randomize('class')">Roll Class</button>
        <br><button onclick="nextPage('page-background')">Next</button>
    </div>

    <div id="page-background" class="page">
        <h2>Background</h2>
        <input type="text" id="in-background" oninput="update('background', this.value)">
        <br><button onclick="randomize('background')">Roll Background</button>
        <br><button onclick="nextPage('page-complete')">Finish</button>
    </div>

    <!-- Completed Character Sheet -->
    <div id="page-complete" class="page">
        <h2>Final Record</h2>
        <div class="sheet" id="final-sheet"></div>
        <button onclick="location.reload()">Start New</button>
    </div>
</div>

<script>
    const options = {
        race: ["Human", "Elf", "Dwarf", "Halfling", "Tiefling", "Dragonborn"],
        gender: ["Male", "Female", "Non-Binary", "Agender"],
        class: ["Fighter", "Wizard", "Rogue", "Cleric", "Barbarian", "Bard"],
        background: ["Acolyte", "Criminal", "Soldier", "Sage", "Charlatan", "Hermit"]
    };

    let char = {
        race: "Human", gender: "Non-Binary", class: "Fighter", background: "Criminal",
        stats: { STR: 10, DEX: 10, CON: 10, INT: 10, WIS: 10, CHA: 10 }
    };

    function update(key, val) { char[key] = val; }

    function updateStat(stat, val) { char.stats[stat] = val; }

    function randomize(type) {
        const val = options[type][Math.floor(Math.random() * options[type].length)];
        char[type] = val;
        document.getElementById('in-' + type).value = val;
    }

    function rollAllStats() {
        for(let s in char.stats) {
            char.stats[s] = Math.floor(Math.random() * 12) + 6;
        }
        renderStats();
    }

    function renderStats() {
        const div = document.getElementById('stat-list');
        div.innerHTML = '';
        for(let s in char.stats) {
            div.innerHTML += `<div>${s}: <input type="number" value="${char.stats[s]}" onchange="updateStat('${s}', this.value)" style="width: 50px;"></div>`;
        }
    }

    function nextPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        
        // Sync values if moving to a page with inputs
        if(id.startsWith('page-')) {
            const key = id.replace('page-', '');
            if(options[key]) document.getElementById('in-' + key).value = char[key];
        }
        
        if(id === 'page-complete') showSheet();
    }

    function showSheet() {
        let statsHtml = '';
        for(let s in char.stats) statsHtml += `<div class="sheet-row"><span>${s}</span> <span>${char.stats[s]}</span></div>`;
        
        document.getElementById('final-sheet').innerHTML = `
            <h3>Character Profile</h3>
            <p><strong>Race:</strong> ${char.race}</p>
            <p><strong>Gender:</strong> ${char.gender}</p>
            <p><strong>Class:</strong> ${char.class}</p>
            <p><strong>Background:</strong> ${char.background}</p>
            <h3>Stats</h3>
            ${statsHtml}
        `;
    }

    // Init
    renderStats();
</script>
</body>
</html>
