<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Starship Control Terminal</title>
    <style>
        /* Cockpit Background */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            color: #ff9900;
        }

        /* Ambient cockpit decorations */
        .cockpit-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            opacity: 0.3;
        }

        /* The Console Frame */
        .console-frame {
            background: #2c2f33;
            padding: 30px;
            border: 8px solid #455a64;
            border-radius: 15px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
            z-index: 1;
            position: relative;
        }

        .status-light {
            position: absolute;
            top: 10px;
            right: 15px;
            width: 10px;
            height: 10px;
            background: #ff0000;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff0000;
            animation: blink 2s infinite;
        }

        @keyframes blink { 50% { opacity: 0.3; } }

        /* Calculator UI */
        .calculator { width: 280px; }
        
        #display {
            background: #000;
            color: #00ff41; /* Classic terminal green */
            text-align: right;
            padding: 15px;
            font-size: 1.8rem;
            border: 2px inset #555;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #00ff41;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 15px;
            background: #373e44;
            color: #ddd;
            border: 1px solid #666;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
        }

        button:hover { background: #4a5157; border-color: #ff9900; }
        button:active { background: #ff9900; color: #000; }

        .btn-op { color: #ff9900; }
        .btn-eq { background: #b71c1c; color: white; grid-column: span 2; }
    </style>
</head>
<body>

    <div class="cockpit-overlay"></div>

    <div class="console-frame">
        <div class="status-light"></div>
        <div style="font-size: 0.7rem; margin-bottom: 5px;">SYSTEM STATUS: ONLINE</div>
        
        <div id="display">0</div>
        
        <div class="grid">
            <button onclick="clearDisplay()">AC</button>
            <button class="btn-op" onclick="appendToDisplay('/')">÷</button>
            <button class="btn-op" onclick="appendToDisplay('*')">×</button>
            <button onclick="deleteLast()">DEL</button>
            
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button class="btn-op" onclick="appendToDisplay('-')">-</button>
            
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button class="btn-op" onclick="appendToDisplay('+')">+</button>
            
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button onclick="appendToDisplay('0')">0</button>
            
            <button onclick="appendToDisplay('.')">.</button>
            <button class="btn-eq" onclick="calculate()" style="grid-column: span 3;">EXECUTE CALCULATION</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');

        function appendToDisplay(input) {
            if (display.innerText === '0') display.innerText = input;
            else display.innerText += input;
        }

        function clearDisplay() { display.innerText = '0'; }

        function deleteLast() {
            display.innerText = display.innerText.slice(0, -1);
            if (display.innerText === '') display.innerText = '0';
        }

        function calculate() {
            try {
                // Replacing visual symbols with JS operators
                let equation = display.innerText.replace('×', '*').replace('÷', '/');
                display.innerText = new Function('return ' + equation)();
            } catch (error) {
                display.innerText = 'ERROR';
            }
        }
    </script>
</body>
</html>
