<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heroclix Team Builder</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e74c3c; }
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        
        /* Card Flip Styles */
        .card-stage { width: 300px; height: 400px; perspective: 1000px; margin: 20px auto; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .card-stage.flipped .card-inner { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .back { transform: rotateY(180deg); }
        img { width: 100%; height: 100%; object-fit: cover; }

        /* UI Elements */
        .library, .team-builder { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; border: none; border-radius: 4px; background: var(--primary); color: white; }
        .stats { font-weight: bold; color: var(--accent); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Heroclix Manager</h1>

    <div class="library">
        <h2>Available Cards</h2>
        <div id="library-list"></div>
    </div>

    <div class="team-builder">
        <h2>My Team (Points: <span id="total-points">0</span>)</h2>
        <div id="active-card-container">
            </div>
        <div id="nav-controls">
            <button onclick="changeCard(-1)">Previous</button>
            <button onclick="changeCard(1)">Next</button>
        </div>
    </div>
</div>

<script>
    // 1. DATA: Add your cards here
    let cards = [
        { id: 1, name: "Spider-Man", points: 75, front: "https://via.placeholder.com/300x400/3498db/ffffff?text=Spider-Man+Front", back: "https://via.placeholder.com/300x400/2980b9/ffffff?text=Spider-Man+Back" },
        { id: 2, name: "Iron Man", points: 120, front: "https://via.placeholder.com/300x400/e74c3c/ffffff?text=Iron-Man+Front", back: "https://via.placeholder.com/300x400/c0392b/ffffff?text=Iron-Man+Back" },
        { id: 3, name: "Batman", points: 90, front: "https://via.placeholder.com/300x400/2c3e50/ffffff?text=Batman+Front", back: "https://via.placeholder.com/300x400/34495e/ffffff?text=Batman+Back" }
    ];

    let myTeam = [];
    let currentViewIndex = 0;

    // 2. INITIALIZATION: Sort Alpha and Render
    cards.sort((a, b) => a.name.localeCompare(b.name));

    function renderLibrary() {
        const list = document.getElementById('library-list');
        list.innerHTML = cards.map(c => `<button onclick="addToTeam(${c.id})">Add ${c.name} (${c.points} pts)</button>`).join('');
    }

    // 3. LOGIC: Manage Team
    function addToTeam(id) {
        const card = cards.find(c => c.id === id);
        myTeam.push(card);
        updateTeamView();
    }

    function updateTeamView() {
        const total = myTeam.reduce((sum, c) => sum + c.points, 0);
        document.getElementById('total-points').innerText = total;
        renderActiveCard();
    }

    function renderActiveCard() {
        const container = document.getElementById('active-card-container');
        if (myTeam.length === 0) {
            container.innerHTML = "<p>Select cards to start your team.</p>";
            return;
        }
        const card = myTeam[currentViewIndex];
        container.innerHTML = `
            <div class="card-stage" onclick="this.classList.toggle('flipped')">
                <div class="card-inner">
                    <div class="front"><img src="${card.front}"></div>
                    <div class="back"><img src="${card.back}"></div>
                </div>
            </div>
            <p><strong>${card.name}</strong></p>
        `;
    }

    function changeCard(dir) {
        if (myTeam.length === 0) return;
        currentViewIndex = (currentViewIndex + dir + myTeam.length) % myTeam.length;
        renderActiveCard();
    }

    renderLibrary();
</script>
</body>
</html>
