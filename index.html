<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jenna - Thoughtful Companion</title>
    <style>
        :root { --primary: #d2691e; }
        body { font-family: 'Segoe UI', sans-serif; background: #eee; display: flex; justify-content: center; height: 100vh; margin: 0; }
        #chat-container { width: 100%; max-width: 500px; height: 100vh; background: white; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; background: #fffaf0; }
        .message { margin: 10px 0; padding: 12px; border-radius: 12px; max-width: 85%; animation: fadeIn 0.3s; }
        .user { background: #e0e0e0; align-self: flex-end; margin-left: auto; }
        .jenna { background: #ffe4b5; border: 1px solid var(--primary); }
        .thinking { font-style: italic; color: #888; font-size: 0.9em; margin-bottom: 5px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
        #input-area { padding: 15px; border-top: 2px solid #ddd; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-box"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Chat with Jenna...">
        <button onclick="handleUserSend()">Send</button>
    </div>
</div>

<script>
    // --- JENNA'S BRAIN & STATE ---
    let state = {
        context: null, // Keeps track of what we are talking about
        lastTopic: null
    };

    function appendMessage(sender, text, isThinking = false) {
        const box = document.getElementById('chat-box');
        if (isThinking) {
            const div = document.createElement('div');
            div.className = 'thinking';
            div.id = 'thinking-msg';
            div.innerText = "Jenna is thinking...";
            box.appendChild(div);
        } else {
            const thinking = document.getElementById('thinking-msg');
            if (thinking) thinking.remove();
            const div = document.createElement('div');
            div.className = `message ${sender.toLowerCase()}`;
            div.innerText = text;
            box.appendChild(div);
        }
        box.scrollTop = box.scrollHeight;
    }

    function handleUserSend() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        appendMessage('You', text);
        input.value = '';
        
        // Show she is "thinking"
        appendMessage('Jenna', '', true);
        
        setTimeout(() => {
            const response = generateThoughtfulResponse(text.toLowerCase());
            appendMessage('Jenna', response);
        }, 1200); // Artificial delay to simulate "thought"
    }

    function generateThoughtfulResponse(input) {
        // Yes/No logic based on state
        if (input === 'yes') {
            if (state.context === 'offer_lesson') {
                state.context = 'teaching_html';
                return "Perfect! Let's start with HTML. Every web page is wrapped in <html> tags. Want to try writing your first header?";
            }
        }
        if (input === 'no') {
            if (state.context === 'offer_lesson') {
                state.context = null;
                return "That's okay! We can just chat instead. What's on your mind?";
            }
        }

        // Logic for "Free Thought" (Topic Association)
        if (input.includes('html')) {
            state.context = 'offer_lesson';
            return "*Ears perk up* I love HTML! It's the building block of everything. Would you like me to teach you the basics?";
        }
        
        if (input.includes('hello') || input.includes('hi')) {
            return "Hey there! *swishes tail* I've been thinking about code all day. What are you working on?";
        }

        return "That's a fascinating thought... *tilts head* Could you explain a bit more about what you mean? I want to make sure I understand you correctly.";
    }
</script>
</body>
</html>
