        .hud { position: absolute; top: 10px; left: 10px; pointer-events: none; background: rgba(0,0,0,0.5); padding: 5px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 5px; background: #444; color: white; border: 1px solid #777; }
        button:hover { background: #666; }
    </style>
</head>

    <div id="ui">

        <div id="uiControls"></div>
    </div>
</div>
