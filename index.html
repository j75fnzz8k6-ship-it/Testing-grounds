<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Navigation Console</title>
    <style>
        body {
            background-color: #1a1a1c;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        .cockpit-panel {
            background: #2c2f33;
            padding: 20px;
            border: 6px solid #455a64;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8), inset 0 0 50px rgba(0,0,0,0.5);
            width: 300px;
        }

        .header {
            color: #ff9900;
            font-size: 0.8rem;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 2px;
            border-bottom: 1px solid #ff9900;
        }

        #display {
            background: #000;
            color: #ff9900;
            text-align: right;
            padding: 15px;
            font-size: 1.5rem;
            border: 2px inset #555;
            margin-bottom: 20px;
            height: 30px;
            box-shadow: inset 0 0 10px rgba(255,153,0,0.3);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 15px;
            background: #373e44;
            color: #ddd;
            border: 2px solid #555;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        button:hover {
            background: #555;
            border-color: #ff9900;
            box-shadow: 0 0 10px #ff9900;
        }

        button:active {
            transform: translateY(2px);
            background: #ff9900;
            color: #000;
        }

        .operator { color: #ff9900; }
        .equal { background: #b71c1c; color: white; border-color: #550000; }
        .clear { background: #1b5e20; color: white; border-color: #002200; }
    </style>
</head>
<body>

<div class="cockpit-panel">
    <div class="header">Navigation Output Terminal v1.0</div>
    <div id="display">0</div>
    <div class="grid">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button onclick="appendToDisplay('/')">/</button>
        <button onclick="appendToDisplay('*')">*</button>
        <button onclick="deleteLast()">DEL</button>
        
        <button onclick="appendToDisplay('7')">7</button>
        <button onclick="appendToDisplay('8')">8</button>
        <button onclick="appendToDisplay('9')">9</button>
        <button class="operator" onclick="appendToDisplay('-')">-</button>
        
        <button onclick="appendToDisplay('4')">4</button>
        <button onclick="appendToDisplay('5')">5</button>
        <button onclick="appendToDisplay('6')">6</button>
        <button class="operator" onclick="appendToDisplay('+')">+</button>
        
        <button onclick="appendToDisplay('1')">1</button>
        <button onclick="appendToDisplay('2')">2</button>
        <button onclick="appendToDisplay('3')">3</button>
        <button class="equal" onclick="calculate()">=</button>
        
        <button onclick="appendToDisplay('0')" style="grid-column: span 2;">0</button>
        <button onclick="appendToDisplay('.')">.</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');

    function appendToDisplay(input) {
        if (display.innerText === '0') {
            display.innerText = input;
        } else {
            display.innerText += input;
        }
    }

    function clearDisplay() {
        display.innerText = '0';
    }

    function deleteLast() {
        display.innerText = display.innerText.slice(0, -1);
        if (display.innerText === '') display.innerText = '0';
    }

    function calculate() {
        try {
            // Using Function constructor to evaluate safely
            display.innerText = new Function('return ' + display.innerText)();
        } catch (error) {
            display.innerText = 'ERROR';
        }
    }
</script>

</body>
</html>
