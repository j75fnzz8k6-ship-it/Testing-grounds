<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mansion RPS Crawler</title>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; }
        #gameContainer { position: relative; border: 4px solid #555; }
        canvas { display: block; background: #333; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; background: rgba(0,0,0,0.8); flex-direction: column; align-items: center; justify-content: center; }
        .hud { position: absolute; top: 10px; left: 10px; pointer-events: none; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div class="hud" id="hud">
        Wins Streak: 0 | Losses: 0 | Inventory: Rock: 0, Paper: 0, Scissor: 0
    </div>
    <div id="ui">
        <h2 id="uiTitle">Challenge!</h2>
        <div id="uiControls"></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui');
    const hud = document.getElementById('hud');
    const uiTitle = document.getElementById('uiTitle');
    const uiControls = document.getElementById('uiControls');

    // Game State
    let player = { x: 400, y: 300, w: 20, h: 40, inv: { rock: 0, paper: 0, scissors: 0 }, streak: 0, losses: 0 };
    let gameState = 'EXPLORING'; // EXPLORING, RPS
    let roomContent = null; // { type: 'CHEST' or 'PERSON', item: 'rock'/'paper'/'scissors' }
    let lastResult = '';

    function generateRoom() {
        const rand = Math.random();
        if (rand > 0.5) {
            const items = ['rock', 'paper', 'scissors'];
            roomContent = { type: 'CHEST', item: items[Math.floor(Math.random() * 3)], x: 200 + Math.random()*400, y: 150 + Math.random()*300 };
        } else {
            roomContent = { type: 'PERSON', x: 200 + Math.random()*400, y: 150 + Math.random()*300 };
        }
    }

    generateRoom();

    // Input Handling
    const keys = {};
    window.addEventListener('keydown', e => keys[e.key] = true);
    window.addEventListener('keyup', e => keys[e.key] = false);

    function update() {
        if (gameState !== 'EXPLORING') return;

        if (keys['ArrowUp'] && player.y > 0) player.y -= 5;
        if (keys['ArrowDown'] && player.y < 560) player.y += 5;
        if (keys['ArrowLeft'] && player.x > 0) player.x -= 5;
        if (keys['ArrowRight'] && player.x < 780) player.x += 5;

        // Check for Room Transition (Walking into walls)
        if (player.x <= 0 || player.x >= 780 || player.y <= 0 || player.y >= 560) {
            player.x = 400; player.y = 300;
            generateRoom();
        }

        // Check for collision
        if (roomContent && Math.abs(player.x - roomContent.x) < 30 && Math.abs(player.y - roomContent.y) < 30) {
            if (roomContent.type === 'CHEST') {
                player.inv[roomContent.item]++;
                roomContent = null;
            } else {
                startRPS();
            }
        }
        updateHUD();
    }

    function updateHUD() {
        hud.innerText = `Win Streak: ${player.streak} | Losses: ${player.losses}/3 | Inv: R:${player.inv.rock} P:${player.inv.paper} S:${player.inv.scissors}`;
    }

    function startRPS() {
        gameState = 'RPS';
        ui.style.display = 'flex';
        uiTitle.innerText = "A Challenger Appears! Pick your move.";
        uiControls.innerHTML = '';
        ['rock', 'paper', 'scissors'].forEach(move => {
            const btn = document.createElement('button');
            btn.innerText = move.toUpperCase();
            btn.onclick = () => playRPS(move);
            uiControls.appendChild(btn);
        });
    }

    function playRPS(playerChoice, forceWin = false) {
        const moves = ['rock', 'paper', 'scissors'];
        const cpuChoice = moves[Math.floor(Math.random() * 3)];
        
        let win = false;
        if (forceWin) {
            win = true;
            lastResult = "You used an item to cheat and WIN!";
        } else {
            if (playerChoice === cpuChoice) { lastResult = "Tie! Play again."; startRPS(); return; }
            if ((playerChoice === 'rock' && cpuChoice === 'scissors') || 
                (playerChoice === 'scissors' && cpuChoice === 'paper') || 
                (playerChoice === 'paper' && cpuChoice === 'rock')) {
                win = true;
                lastResult = `You played ${playerChoice}, they played ${cpuChoice}. You Win!`;
            } else {
                win = false;
                lastResult = `You played ${playerChoice}, they played ${cpuChoice}. You Lose!`;
            }
        }

        if (win) {
            player.streak++;
            if (player.streak >= 10) {
                alert("YOU ESCAPED THE MANSION! You won 10 in a row.");
                location.reload();
            }
        } else {
            player.streak = 0;
            player.losses++;
            if (player.losses >= 3) {
                alert("GAME OVER. You lost 3 times.");
                location.reload();
            }
        }

        uiTitle.innerText = lastResult;
        uiControls.innerHTML = '';
        
        if (!win && (player.inv.rock > 0 || player.inv.paper > 0 || player.inv.scissors > 0)) {
            uiTitle.innerText += " (Use inventory to flip loss!)";
            ['rock', 'paper', 'scissors'].forEach(item => {
                if(player.inv[item] > 0) {
                    const btn = document.createElement('button');
                    btn.innerText = "Use " + item.toUpperCase();
                    btn.onclick = () => { player.inv[item]--; playRPS(null, true); };
                    uiControls.appendChild(btn);
                }
            });
        }
        
        const contBtn = document.createElement('button');
        contBtn.innerText = "Continue Exploring";
        contBtn.onclick = () => { ui.style.display = 'none'; gameState = 'EXPLORING'; generateRoom(); };
        uiControls.appendChild(contBtn);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Draw Room
        if (roomContent) {
            ctx.fillStyle = roomContent.type === 'CHEST' ? 'gold' : 'red';
            ctx.fillRect(roomContent.x, roomContent.y, 30, 30);
            ctx.fillStyle = 'white';
            ctx.fillText(roomContent.type, roomContent.x, roomContent.y - 5);
        }

        // Draw Player (Stick Figure)
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(player.x + 10, player.y - 10, 10, 0, Math.PI * 2); // Head
        ctx.moveTo(player.x + 10, player.y);
        ctx.lineTo(player.x + 10, player.y + 20); // Body
        ctx.moveTo(player.x + 10, player.y + 5);
        ctx.lineTo(player.x - 5, player.y + 15); // Arm
        ctx.moveTo(player.x + 10, player.y + 5);
        ctx.lineTo(player.x + 25, player.y + 15); // Arm
        ctx.moveTo(player.x + 10, player.y + 20);
        ctx.lineTo(player.x - 5, player.y + 40); // Leg
        ctx.moveTo(player.x + 10, player.y + 20);
        ctx.lineTo(player.x + 25, player.y + 40); // Leg
        ctx.stroke();

        update();
        requestAnimationFrame(draw);
    }

    draw();
</script>
</body>
</html>
