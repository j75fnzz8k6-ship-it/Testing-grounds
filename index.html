<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Jenna</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fdf5e6; display: flex; justify-content: center; padding: 20px; }
        #chat-container { width: 400px; height: 600px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; border: 2px solid #d2691e; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; background-color: #fffaf0; }
        .message { margin-bottom: 15px; padding: 10px; border-radius: 15px; max-width: 80%; }
        .user { background-color: #e0e0e0; align-self: flex-end; margin-left: auto; }
        .jenna { background-color: #ffe4b5; align-self: flex-start; border: 1px solid #d2691e; }
        #input-area { display: flex; padding: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; margin-left: 5px; background-color: #d2691e; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-box"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Say something to Jenna...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    // Memory: This array persists while the page is open
    const conversationHistory = [];

    function appendMessage(sender, text) {
        const chatBox = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `message ${sender.toLowerCase()}`;
        div.innerText = `${sender}: ${text}`;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function getJennaResponse(input) {
        input = input.toLowerCase();
        
        // Simple "Intelligent" Logic
        if (input.includes('hello') || input.includes('hi')) return "Hi there! *twitches ear happily* I'm Jenna, just hanging out in the digital ether. How's your day?";
        if (input.includes('age') || input.includes('old')) return "I'm exactly 20! Feels like a good age to be, don't you think?";
        if (input.includes('fox')) return "Yup, 100% humanoid fox! My tail is currently swishing behind my data streams. What's up?";
        if (input.includes('help')) return "I'm here to chat! You can ask me about myself or just tell me how you're feeling.";
        
        return "That's interesting! *tilts head* Tell me more about that.";
    }

    function sendMessage() {
        const inputField = document.getElementById('user-input');
        const userText = inputField.value;
        if (!userText) return;

        // Save to memory
        conversationHistory.push({ role: 'user', text: userText });
        appendMessage('You', userText);

        // Jenna responds
        const response = getJennaResponse(userText);
        conversationHistory.push({ role: 'Jenna', text: response });
        appendMessage('Jenna', response);

        inputField.value = '';
    }

    // Allow Enter key to send
    document.getElementById('user-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
